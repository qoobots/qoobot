# ==============================================
# qoocloud — 本地开发 Docker Compose
# 启动基础设施 + 所有微服务
# ==============================================

version: "3.9"

services:
  # ======== 基础设施 ========
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: qoobot
      POSTGRES_PASSWORD: qoobot
      POSTGRES_MULTIPLE_DATABASES: qoocloud_inference,qoocloud_device,qoocloud_ota,qoocloud_data,qoocloud_orchestra,qoocloud_twin,qoocloud_teleop
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_db.sh:/docker-entrypoint-initdb.d/init-multi-db.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qoobot"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - qoocloud-net

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - qoocloud-net

  nacos:
    image: nacos/nacos-server:v2.3.2
    environment:
      MODE: standalone
      PREFER_HOST_MODE: hostname
    ports:
      - "8848:8848"
      - "9848:9848"
    volumes:
      - nacos_data:/home/nacos/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8848/nacos/v1/console/health/readiness || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
    networks:
      - qoocloud-net

  kafka:
    image: apache/kafka:3.8.1
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_PROCESS_ROLES: broker,controller
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - qoocloud-net

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - qoocloud-net

  sentinel:
    image: bladex/sentinel-dashboard:1.8.7
    ports:
      - "8858:8858"
    environment:
      SERVER_PORT: 8858
    networks:
      - qoocloud-net

  # ======== 微服务 ========
  qoocloud-gateway:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
      args:
        MODULE: qoocloud-gateway
    ports:
      - "8080:8080"
    environment:
      NACOS_SERVER: nacos:8848
      SENTINEL_DASHBOARD: sentinel:8858
    depends_on:
      postgres:
        condition: service_healthy
      nacos:
        condition: service_healthy
    networks:
      - qoocloud-net

  qoocloud-inference:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
      args:
        MODULE: qoocloud-inference
    ports:
      - "8200:8200"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/qoocloud_inference
      DB_USERNAME: qoobot
      DB_PASSWORD: qoobot
      REDIS_HOST: redis
      NACOS_SERVER: nacos:8848
      SENTINEL_DASHBOARD: sentinel:8858
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nacos:
        condition: service_healthy
    networks:
      - qoocloud-net

  qoocloud-device:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
      args:
        MODULE: qoocloud-device
    ports:
      - "8201:8201"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/qoocloud_device
      DB_USERNAME: qoobot
      DB_PASSWORD: qoobot
      REDIS_HOST: redis
      NACOS_SERVER: nacos:8848
      SENTINEL_DASHBOARD: sentinel:8858
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nacos:
        condition: service_healthy
    networks:
      - qoocloud-net

  qoocloud-ota:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
      args:
        MODULE: qoocloud-ota
    ports:
      - "8202:8202"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/qoocloud_ota
      DB_USERNAME: qoobot
      DB_PASSWORD: qoobot
      REDIS_HOST: redis
      NACOS_SERVER: nacos:8848
      MINIO_ENDPOINT: http://minio:9000
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      nacos:
        condition: service_healthy
    networks:
      - qoocloud-net

  qoocloud-data:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
      args:
        MODULE: qoocloud-data
    ports:
      - "8203:8203"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/qoocloud_data
      DB_USERNAME: qoobot
      DB_PASSWORD: qoobot
      REDIS_HOST: redis
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      NACOS_SERVER: nacos:8848
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_started
      nacos:
        condition: service_healthy
    networks:
      - qoocloud-net

  qoocloud-orchestra:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
      args:
        MODULE: qoocloud-orchestra
    ports:
      - "8204:8204"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/qoocloud_orchestra
      DB_USERNAME: qoobot
      DB_PASSWORD: qoobot
      REDIS_HOST: redis
      NACOS_SERVER: nacos:8848
    depends_on:
      postgres:
        condition: service_healthy
      nacos:
        condition: service_healthy
    networks:
      - qoocloud-net

  qoocloud-twin:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
      args:
        MODULE: qoocloud-twin
    ports:
      - "8205:8205"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/qoocloud_twin
      DB_USERNAME: qoobot
      DB_PASSWORD: qoobot
      REDIS_HOST: redis
      NACOS_SERVER: nacos:8848
    depends_on:
      postgres:
        condition: service_healthy
      nacos:
        condition: service_healthy
    networks:
      - qoocloud-net

  qoocloud-observability:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
      args:
        MODULE: qoocloud-observability
    ports:
      - "8206:8206"
    environment:
      REDIS_HOST: redis
      NACOS_SERVER: nacos:8848
    depends_on:
      redis:
        condition: service_healthy
      nacos:
        condition: service_healthy
    networks:
      - qoocloud-net

  qoocloud-infra:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
      args:
        MODULE: qoocloud-infra
    ports:
      - "8207:8207"
    environment:
      REDIS_HOST: redis
      NACOS_SERVER: nacos:8848
    depends_on:
      redis:
        condition: service_healthy
      nacos:
        condition: service_healthy
    networks:
      - qoocloud-net

  qoocloud-teleop:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
      args:
        MODULE: qoocloud-teleop
    ports:
      - "8208:8208"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/qoocloud_teleop
      DB_USERNAME: qoobot
      DB_PASSWORD: qoobot
      REDIS_HOST: redis
      NACOS_SERVER: nacos:8848
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nacos:
        condition: service_healthy
    networks:
      - qoocloud-net

volumes:
  postgres_data:
  redis_data:
  nacos_data:
  kafka_data:
  minio_data:

networks:
  qoocloud-net:
    driver: bridge
