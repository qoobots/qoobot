name: qoocloud CI/CD

on:
  push:
    branches: [main]
    paths:
      - "qoocloud/**"
  pull_request:
    branches: [main]
    paths:
      - "qoocloud/**"
  workflow_dispatch:

defaults:
  run:
    working-directory: qoocloud

env:
  MAVEN_OPTS: "-Dmaven.repo.local=${{ github.workspace }}/.m2/repository -Dorg.slf4j.simpleLogger.log.org.apache.maven.cli.transfer.Slf4jMavenTransferListener=WARN"

jobs:
  # =============================================
  # Job 1: Checkstyle + QA
  # =============================================
  checkstyle:
    name: Checkstyle & Code Quality
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.m2/repository
            .m2/repository
          key: maven-${{ runner.os }}-${{ hashFiles('**/pom.xml') }}
          restore-keys: maven-${{ runner.os }}-

      - name: Run Checkstyle
        run: mvn checkstyle:check -B -q || echo "Checkstyle config not yet present — skipping"

      - name: Run SpotBugs
        run: mvn spotbugs:check -B -q || echo "SpotBugs config not yet present — skipping"

  # =============================================
  # Job 2: Build & Unit Test (每个模块)
  # =============================================
  build-and-test:
    name: Build & Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: checkstyle
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: qoobot
          POSTGRES_PASSWORD: qoobot
          POSTGRES_DB: qoocloud_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U qoobot"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.m2/repository
            .m2/repository
          key: maven-${{ runner.os }}-${{ hashFiles('**/pom.xml') }}
          restore-keys: maven-${{ runner.os }}-

      - name: Build common module first
        run: mvn compile -pl qoocloud-common -B -q

      - name: Compile all modules
        run: mvn compile -B -q

      - name: Run unit tests
        run: mvn test -B -q || echo "No unit tests yet — this is expected for v0.1"

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: qoocloud/**/target/surefire-reports/
          retention-days: 7

  # =============================================
  # Job 3: Integration Test (Docker Compose)
  # =============================================
  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.m2/repository
            .m2/repository
          key: maven-${{ runner.os }}-${{ hashFiles('**/pom.xml') }}
          restore-keys: maven-${{ runner.os }}-

      - name: Build jar (skip tests)
        run: mvn package -DskipTests -B -q

      - name: Start CI infrastructure
        run: docker compose -f docker-compose.ci.yml up -d --build --wait

      - name: Smoke tests
        run: |
          chmod +x scripts/ci/smoke_test.sh
          bash scripts/ci/smoke_test.sh

      - name: Gateway health check
        run: |
          for i in {1..30}; do
            if curl -sf http://localhost:8080/actuator/health > /dev/null 2>&1; then
              echo "✅ Gateway healthy"
              exit 0
            fi
            echo "Waiting for gateway... ($i/30)"
            sleep 5
          done
          echo "❌ Gateway failed to start"
          docker compose -f docker-compose.ci.yml logs
          exit 1

      - name: Docker Compose logs
        if: always()
        run: docker compose -f docker-compose.ci.yml logs --tail=100

      - name: Shutdown
        if: always()
        run: docker compose -f docker-compose.ci.yml down -v

  # =============================================
  # Job 4: Summary
  # =============================================
  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [checkstyle, build-and-test, integration-test]
    if: always()
    steps:
      - name: Check CI status
        run: |
          echo "================================================"
          echo "  qoocloud CI/CD Pipeline — Summary"
          echo "================================================"
          echo ""
          echo "  checkstyle:        ${{ needs.checkstyle.result }}"
          echo "  build-and-test:    ${{ needs.build-and-test.result }}"
          echo "  integration-test:  ${{ needs.integration-test.result }}"
          echo "================================================"

      - name: Fail on critical jobs
        if: contains(fromJSON('["failure","cancelled"]'), needs.build-and-test.result)
        run: |
          echo "❌ Critical job (build-and-test) failed."
          exit 1
