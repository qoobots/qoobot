apiVersion: v1
kind: ConfigMap
metadata:
  name: qooauth-config
  namespace: qooauth
  labels:
    app.kubernetes.io/part-of: qoobot
    app.kubernetes.io/component: auth
data:
  # Database
  DB_HOST: "postgresql.qooauth.svc.cluster.local"
  DB_PORT: "5432"
  DB_NAME: "qooauth"

  # Redis
  REDIS_HOST: "redis.qooauth.svc.cluster.local"
  REDIS_PORT: "6379"

  # JWT Configuration
  JWT_ISSUER_URI: "https://auth.qoobot.io"
  JWT_ACCESS_TOKEN_TTL: "3600"
  JWT_REFRESH_TOKEN_TTL: "2592000"

  # Service Discovery
  AUTH_SERVICE_URL: "http://qooauth-auth:8081"
  USER_SERVICE_URL: "http://qooauth-user:8087"
  DEVICE_SERVICE_URL: "http://qooauth-device:8082"
  API_KEY_SERVICE_URL: "http://qooauth-api-key:8083"
  SECURITY_SERVICE_URL: "http://qooauth-security:8084"
  ROBOT_TRUST_SERVICE_URL: "http://qooauth-robot-trust:8085"
  DEVELOPER_SERVICE_URL: "http://qooauth-developer:8086"
  AUDIT_SERVICE_URL: "http://qooauth-audit:8088"

  # Gateway
  GATEWAY_CORS_ALLOWED_ORIGINS: "*"
  GATEWAY_RATE_LIMIT_ENABLED: "true"
  GATEWAY_RATE_LIMIT_CAPACITY: "100"
  GATEWAY_RATE_LIMIT_REFILL: "10"

  # Logging
  LOG_LEVEL: "INFO"
  LOG_FORMAT: "json"

  # Monitoring
  MANAGEMENT_ENDPOINTS_EXPOSURE: "health,info,metrics,prometheus"
