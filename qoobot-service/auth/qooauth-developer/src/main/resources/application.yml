server:
  port: 8086

spring:
  application:
    name: qooauth-developer
  datasource:
    url: jdbc:postgresql://localhost:5432/qooauth
    username: ${DB_USERNAME:qooauth}
    password: ${DB_PASSWORD:qooauth}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: false
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${JWT_ISSUER_URI:http://localhost:8081}
          jwk-set-uri: ${JWK_SET_URI:http://localhost:8081/.well-known/jwks.json}

developer:
  certificate:
    max-per-type: 5
    key-algorithm: EC
    key-curve: secp256r1
  sandbox:
    default-ttl-seconds: 3600
    max-ttl-seconds: 86400
    max-sandboxes-per-user: 3
  signing:
    algorithm: SHA256withECDSA
    key-curve: secp256r1

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when_authorized

logging:
  level:
    com.qoobot.qooauth.developer: DEBUG
    org.springframework.security: INFO
