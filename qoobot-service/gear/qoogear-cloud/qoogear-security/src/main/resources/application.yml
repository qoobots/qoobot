server:
  port: 8095

spring:
  application:
    name: qoogear-security
  datasource:
    url: jdbc:postgresql://localhost:5432/qoogear
    username: qoogear
    password: qoogear_dev
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848

qoogear:
  security:
    jwt:
      secret: ${JWT_SECRET:qoogear-dev-secret-key-must-be-at-least-64-bytes-long-for-hs512-algorithm}
      access-expiration-ms: 900000
      refresh-expiration-ms: 604800000

logging:
  level:
    com.qoobot.qoogear: DEBUG
