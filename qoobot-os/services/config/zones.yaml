# ============================================================================
# qoosvc — 区域定义示例
# 实际运行时由 SLAM 建图后动态配置
# ============================================================================

zones:
  restricted:
    - name: "楼梯口"
      map_id: "home_v1"
      polygons:
        - [[1.5, 2.0], [1.5, 2.5], [2.0, 2.5], [2.0, 2.0]]

  speed_limit:
    - name: "走廊"
      map_id: "home_v1"
      polygons:
        - [[0.0, 1.0], [0.0, 1.5], [8.0, 1.5], [8.0, 1.0]]
      max_speed: 0.5

  preferred:
    - name: "客厅通道"
      map_id: "home_v1"
      polygons:
        - [[2.0, 0.0], [2.0, 2.0], [4.0, 2.0], [4.0, 0.0]]
      weight: 0.3
