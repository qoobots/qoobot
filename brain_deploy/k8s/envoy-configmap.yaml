# ============================================================
# Brain OS — Kubernetes ConfigMap: Envoy gRPC-Web Proxy
# ============================================================
# 将 envoy.yaml 适配为 K8s ConfigMap
# 上游地址使用 K8s Service DNS：brain-ai.brain-os.svc.cluster.local:50051
#
# 部署：
#   kubectl apply -f brain_deploy/k8s/envoy-configmap.yaml
# ============================================================

apiVersion: v1
kind: ConfigMap
metadata:
  name: envoy-config
  namespace: brain-os
  labels:
    app: brain-os
    component: envoy
data:
  envoy.yaml: |
    admin:
      address:
        socket_address:
          address: 0.0.0.0
          port_value: 9901

    static_resources:
      listeners:
        - name: brain_ai_grpc_web
          address:
            socket_address:
              address: 0.0.0.0
              port_value: 8080
          filter_chains:
            - filters:
                - name: envoy.filters.network.http_connection_manager
                  typed_config:
                    "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                    stat_prefix: ingress_http
                    codec_type: AUTO
                    route_config:
                      name: brain_ai_routes
                      virtual_hosts:
                        - name: brain_ai_backend
                          domains: ["*"]
                          routes:
                            - match:
                                prefix: "/"
                              route:
                                cluster: brain_ai_grpc
                                timeout: 60s
                                max_grpc_timeout: 60s
                          cors:
                            allow_origin_string_match:
                              - exact: "*"
                            allow_methods: "GET, POST, OPTIONS, PUT, DELETE"
                            allow_headers: "keep-alive,user-agent,cache-control,content-type,content-transfer-encoding,custom-header-1,x-accept-content-transfer-encoding,x-accept-response-streaming,x-user-agent,x-grpc-web,grpc-timeout"
                            expose_headers: "custom-header-1,grpc-status,grpc-message"
                            max_age: "1728000"
                    http_filters:
                      - name: envoy.filters.http.cors
                        typed_config:
                          "@type": type.googleapis.com/envoy.extensions.filters.http.cors.v3.Cors
                      - name: envoy.filters.http.grpc_web
                        typed_config:
                          "@type": type.googleapis.com/envoy.extensions.filters.http.grpc_web.v3.GrpcWeb
                      - name: envoy.filters.http.router
                        typed_config:
                          "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

      clusters:
        - name: brain_ai_grpc
          type: STRICT_DNS
          connect_timeout: 5s
          lb_policy: ROUND_ROBIN
          http2_protocol_options: {}
          load_assignment:
            cluster_name: brain_ai_grpc
            endpoints:
              - lb_endpoints:
                  - endpoint:
                      address:
                        socket_address:
                          address: brain-ai.brain-os.svc.cluster.local
                          port_value: 50051
          health_checks:
            - timeout: 3s
              interval: 10s
              unhealthy_threshold: 3
              healthy_threshold: 1
              grpc_health_check:
                service_name: ""

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: envoy
  namespace: brain-os
  labels:
    app: brain-os
    component: envoy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: brain-os
      component: envoy
  template:
    metadata:
      labels:
        app: brain-os
        component: envoy
    spec:
      restartPolicy: Always
      containers:
        - name: envoy
          image: envoyproxy/envoy:v1.28-latest
          imagePullPolicy: IfNotPresent
          args:
            - -c
            - /etc/envoy/envoy.yaml
            - --log-level
            - info
          ports:
            - name: grpc-web
              containerPort: 8080
              protocol: TCP
            - name: admin
              containerPort: 9901
              protocol: TCP
          resources:
            requests:
              cpu: "250m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          volumeMounts:
            - name: envoy-config
              mountPath: /etc/envoy
              readOnly: true
          readinessProbe:
            httpGet:
              path: /ready
              port: 9901
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /server_info
              port: 9901
            initialDelaySeconds: 15
            periodSeconds: 10
      volumes:
        - name: envoy-config
          configMap:
            name: envoy-config

---
apiVersion: v1
kind: Service
metadata:
  name: envoy
  namespace: brain-os
  labels:
    app: brain-os
    component: envoy
spec:
  type: ClusterIP
  selector:
    app: brain-os
    component: envoy
  ports:
    - name: grpc-web
      port: 8080
      targetPort: 8080
      protocol: TCP
    - name: admin
      port: 9901
      targetPort: 9901
      protocol: TCP
