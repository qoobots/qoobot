# qoodev CD — 发布流水线
#
# 当推送版本标签 (v*) 时自动发布到 qooeco 市场

name: qoodev CD

on:
  push:
    tags:
      - "v*"

env:
  PYTHON_VERSION: "3.10"

jobs:
  # =========================================================================
  # 构建所有平台包
  # =========================================================================
  build-all:
    name: Build (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x86_64
          - os: ubuntu-24.04-arm
            platform: linux-aarch64
          - os: windows-latest
            platform: windows-x86_64
          - os: macos-latest
            platform: macos-arm64

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install project
        run: |
          python -m pip install -e "."

      - name: Build package
        run: qoo package build --output dist/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: packages-${{ matrix.platform }}
          path: dist/*.qooskills

  # =========================================================================
  # 代码签名
  # =========================================================================
  sign:
    name: Sign Packages
    runs-on: ubuntu-latest
    needs: [build-all]
    steps:
      - uses: actions/checkout@v4

      - name: Download all packages
        uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: Sign packages
        env:
          QOO_SIGNING_KEY: ${{ secrets.QOO_SIGNING_KEY }}
          QOO_SIGNING_CERT: ${{ secrets.QOO_SIGNING_CERT }}
        run: |
          echo "$QOO_SIGNING_KEY" > developer.key
          echo "$QOO_SIGNING_CERT" > developer.cert

          find dist/ -name "*.qooskills" -exec qoo package sign {} --key developer.key --cert developer.cert \;

      - name: Upload signed packages
        uses: actions/upload-artifact@v4
        with:
          name: signed-packages
          path: dist/**/*.qooskills

  # =========================================================================
  # 发布到市场
  # =========================================================================
  publish:
    name: Publish to Market
    runs-on: ubuntu-latest
    needs: [sign]
    environment: production
    steps:
      - name: Download signed packages
        uses: actions/download-artifact@v4
        with:
          name: signed-packages
          path: dist/

      - name: Publish to qooeco market
        env:
          QOOECO_API_KEY: ${{ secrets.QOOECO_API_KEY }}
          QOOECO_API_URL: ${{ vars.QOOECO_API_URL }}
        run: |
          echo "Publishing packages to qooeco market..."
          # curl -X POST "$QOOECO_API_URL/skills/upload" \
          #   -H "Authorization: Bearer $QOOECO_API_KEY" \
          #   -F "package=@dist/*.qooskills"
          echo "  (Market API integration pending)"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**/*.qooskills
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') }}
