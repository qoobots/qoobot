# qoodev CI/CD — GitHub Actions 模板
#
# 使用方式: 复制此文件到 .github/workflows/ 目录
# 或使用 qoo ci init 自动生成

name: qoodev CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.10"
  QOO_SIM_BACKEND: mujoco

jobs:
  # =========================================================================
  # Lint & Type Check
  # =========================================================================
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy

      - name: Lint with ruff
        run: ruff check qoodev/

      - name: Type check with mypy
        run: mypy qoodev/ --ignore-missing-imports

  # =========================================================================
  # Unit Tests
  # =========================================================================
  test:
    name: Unit Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,test]"

      - name: Run tests
        run: qoo test run --junit junit.xml --timeout 120

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-py${{ matrix.python-version }}
          path: junit.xml

  # =========================================================================
  # Simulation Regression Tests
  # =========================================================================
  regression:
    name: Simulation Regression
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install MuJoCo
        run: |
          python -m pip install mujoco

      - name: Install project
        run: |
          python -m pip install -e ".[dev]"

      - name: Run regression tests
        run: qoo test regression --scenario all --output regression_report.json

      - name: Upload regression report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: regression-report
          path: regression_report.json

  # =========================================================================
  # Package Build & Validation
  # =========================================================================
  package:
    name: Build & Validate Package
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install project
        run: |
          python -m pip install -e "."

      - name: Build package
        run: qoo package build

      - name: Validate package
        run: |
          for pkg in dist/*.qooskills; do
            echo "Validating: $pkg"
            qoo package validate "$pkg"
          done

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: qooskills-packages
          path: dist/*.qooskills

  # =========================================================================
  # Dependency Audit
  # =========================================================================
  audit:
    name: Security & Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install project
        run: |
          python -m pip install -e "."

      - name: Resolve dependencies
        run: qoo package resolve --lock qooskills.lock

      - name: Verify lockfile
        run: qoo package resolve --lock qooskills.lock

      - name: Upload lockfile
        uses: actions/upload-artifact@v4
        with:
          name: lockfile
          path: qooskills.lock

  # =========================================================================
  # Release (tags only)
  # =========================================================================
  release:
    name: Create Release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [lint, test, regression, package]
    steps:
      - uses: actions/checkout@v4

      - name: Download packages
        uses: actions/download-artifact@v4
        with:
          name: qooskills-packages
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.qooskills
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
