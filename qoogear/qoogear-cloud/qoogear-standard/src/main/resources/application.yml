server:
  port: 8092

spring:
  application:
    name: qoogear-standard
  datasource:
    url: jdbc:postgresql://localhost:5432/qoogear
    username: qoogear
    password: qoogear_dev
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848

logging:
  level:
    com.qoobot.qoogear: DEBUG
