# force_limits.yaml — Force/torque safety limits per joint

force_limits:
  enabled: true
  global_max_force_N: 100.0
  global_max_torque_Nm: 50.0

  joints:
    - name: "joint_1"
      max_force_N: 80.0
      max_torque_Nm: 40.0
    - name: "joint_2"
      max_force_N: 80.0
      max_torque_Nm: 40.0
    - name: "joint_3"
      max_force_N: 60.0
      max_torque_Nm: 30.0
    - name: "joint_4"
      max_force_N: 40.0
      max_torque_Nm: 20.0
    - name: "joint_5"
      max_force_N: 30.0
      max_torque_Nm: 15.0
    - name: "joint_6"
      max_force_N: 20.0
      max_torque_Nm: 10.0
