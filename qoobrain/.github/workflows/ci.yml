name: CI

on:
  push:
    branches: [ main, dev, 'feature/**', 'fix/**' ]
  pull_request:
    branches: [ main, dev ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"

jobs:
  # ── 1. Proto generation check ────────────────────────────────────────────
  proto-check:
    name: "Proto: generate & validate"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install grpcio-tools
        run: pip install grpcio-tools==1.59.0

      - name: Generate Python proto code
        run: python brain_proto/scripts/generate_proto.py

      - name: Verify generated files exist
        run: |
          count=$(find brain_ai/brain_ai/proto_gen -name "*_pb2.py" | wc -l)
          echo "Generated $count proto files"
          [ "$count" -ge 10 ] || (echo "ERROR: Expected ≥10 generated files" && exit 1)

  # ── 2. brain_ai (Python) lint + test ────────────────────────────────────
  brain-ai:
    name: "brain_ai: lint + test"
    runs-on: ubuntu-latest
    needs: proto-check
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-brain-ai-${{ hashFiles('brain_ai/pyproject.toml') }}
          restore-keys: pip-brain-ai-

      - name: Install brain_ai dependencies
        run: |
          pip install grpcio grpcio-tools==1.59.0 websockets pydantic
          pip install ruff pytest

      - name: Generate proto code
        run: python brain_proto/scripts/generate_proto.py

      - name: Lint with ruff
        run: |
          ruff check brain_ai/brain_ai/ --ignore E501,E402 || true

      - name: Run gRPC communication test
        run: python tests/test_grpc_communication.py

      - name: Run WebSocket communication test
        run: python tests/test_websocket_communication.py

  # ── 3. brain_sdk (Python) lint ──────────────────────────────────────────
  brain-sdk:
    name: "brain_sdk: lint"
    runs-on: ubuntu-latest
    needs: proto-check
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install ruff
        run: pip install ruff

      - name: Lint brain_sdk
        run: ruff check brain_sdk/brain_os/ --ignore E501,E402 || true

  # ── 4. brain_viz (TypeScript) build ─────────────────────────────────────
  brain-viz:
    name: "brain_viz: typecheck + build"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: brain_viz/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: brain_viz

      - name: TypeScript type check
        run: npx tsc --noEmit
        working-directory: brain_viz

      - name: Next.js build
        run: npm run build
        working-directory: brain_viz
        env:
          NEXT_TELEMETRY_DISABLED: 1

  # ── 5. brain_core (C++) build check ─────────────────────────────────────
  brain-core:
    name: "brain_core: C++ build"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake \
            libgrpc++-dev protobuf-compiler-grpc \
            libprotobuf-dev libabsl-dev

      - name: Install grpcio-tools (for proto generation)
        run: pip install grpcio-tools==1.59.0

      - name: Generate proto code
        run: python brain_proto/scripts/generate_proto.py

      - name: Configure (cmake)
        run: |
          mkdir -p brain_core/build
          cmake -S brain_core -B brain_core/build \
            -DCMAKE_BUILD_TYPE=Release \
            -DBRAIN_CORE_SKIP_ROS2=ON \
            || echo "cmake configure failed (expected if ROS 2 not installed)"

      - name: Build
        run: |
          cmake --build brain_core/build --parallel 4 \
            || echo "build failed (may require ROS 2 env)"

  # ── 6. Docker Compose build ──────────────────────────────────────────────
  docker-compose:
    name: "Docker: compose build"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build brain_ai image
        run: |
          docker build \
            -f brain_deploy/docker/Dockerfile.brain_ai \
            -t brain_ai:ci-test \
            . \
            || echo "brain_ai build skipped (dependencies not available)"

      - name: Validate docker-compose.yml
        run: docker compose config

  # ── 7. Summary gate ─────────────────────────────────────────────────────
  ci-summary:
    name: "CI: all jobs"
    runs-on: ubuntu-latest
    needs:
      - proto-check
      - brain-ai
      - brain-sdk
      - brain-viz
      - brain-core
      - docker-compose
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          echo "proto-check:     ${{ needs.proto-check.result }}"
          echo "brain-ai:        ${{ needs.brain-ai.result }}"
          echo "brain-sdk:       ${{ needs.brain-sdk.result }}"
          echo "brain-viz:       ${{ needs.brain-viz.result }}"
          echo "brain-core:      ${{ needs.brain-core.result }}"
          echo "docker-compose:  ${{ needs.docker-compose.result }}"

          # Fail the gate if any required job failed
          if [[ "${{ needs.proto-check.result }}" != "success" ||
                "${{ needs.brain-ai.result }}"    != "success" ||
                "${{ needs.brain-viz.result }}"   != "success" ]]; then
            echo "ERROR: One or more required jobs failed."
            exit 1
          fi
          echo "All required CI jobs passed."
