version: "3.9"

# ============================================================
# Brain OS — 生产环境 Docker Compose
# ============================================================
# 特性：
#   - GPU 支持（NVIDIA Container Runtime）
#   - 资源限制（CPU/内存）
#   - 日志轮转（10MB × 3 文件）
#   - 健康检查 + 依赖顺序
#   - 重启策略：unless-stopped
#
# 部署：
#   export BRAIN_ROBOT_ID=robot_01
#   export BRAIN_LLM_BACKEND=tensorrt
#   docker compose -f brain_deploy/docker-compose.prod.yml up -d
# ============================================================

networks:
  brain-net:
    driver: bridge

volumes:
  ros2-log:
  model-cache:
  ai-logs:
  envoy-logs:

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  # ────────────────────────────────────────
  # brain_core — C++17 ROS 2 实时控制引擎
  # ────────────────────────────────────────
  brain_core:
    build:
      context: ..
      dockerfile: brain_deploy/docker/Dockerfile.brain_core
    image: brain-os/brain_core:${BRAIN_VERSION:-latest}
    container_name: brain_core
    restart: unless-stopped
    network_mode: host
    environment:
      - ROS_DOMAIN_ID=${ROS_DOMAIN_ID:-42}
      - BRAIN_ROBOT_ID=${BRAIN_ROBOT_ID:-sim_robot_01}
      - BRAIN_GRPC_BACKEND=brain_ai:50051
    volumes:
      - ros2-log:/root/.ros/log
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G
        reservations:
          cpus: "1.0"
          memory: 512M
    logging: *default-logging
    command: ["ros2", "launch", "brain_core", "brain_os.launch.py"]
    healthcheck:
      test: ["CMD", "ros2", "node", "list"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ────────────────────────────────────────
  # brain_ai — Python gRPC AI 认知引擎
  # ────────────────────────────────────────
  brain_ai:
    build:
      context: ..
      dockerfile: brain_deploy/docker/Dockerfile.brain_ai
    image: brain-os/brain_ai:${BRAIN_VERSION:-latest}
    container_name: brain_ai
    restart: unless-stopped
    networks:
      - brain-net
    ports:
      - "${BRAIN_AI_GRPC_PORT:-50051}:50051"
      - "${BRAIN_AI_WS_PORT:-8765}:8765"
    environment:
      - BRAIN_OS_ROBOT_ID=${BRAIN_ROBOT_ID:-sim_robot_01}
      - BRAIN_OS_LOG_LEVEL=${BRAIN_LOG_LEVEL:-INFO}
      - BRAIN_LLM_BACKEND=${BRAIN_LLM_BACKEND:-stub}
      - BRAIN_LLM_API_KEY=${BRAIN_LLM_API_KEY:-}
      - BRAIN_LLM_API_URL=${BRAIN_LLM_API_URL:-}
      - BRAIN_LLM_TRT_ENGINE_DIR=${BRAIN_LLM_TRT_ENGINE_DIR:-/workspace/brain_models/llm/}
      - NVIDIA_VISIBLE_DEVICES=${NVIDIA_VISIBLE_DEVICES:-all}
    volumes:
      - model-cache:/workspace/brain_models
      - ai-logs:/workspace/logs
    deploy:
      resources:
        limits:
          cpus: "4.0"
          memory: 8G
        reservations:
          cpus: "2.0"
          memory: 4G
    runtime: nvidia          # Jetson Orin / GPU 节点
    logging: *default-logging
    command: ["python", "-m", "brain_ai.server", "--host", "0.0.0.0", "--port", "50051"]
    healthcheck:
      test: ["CMD", "python", "-c", "import grpc; ch=grpc.insecure_channel('localhost:50051'); grpc.channel_ready_future(ch).result(timeout=3); print('ok')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ────────────────────────────────────────
  # brain_viz — Next.js 可视化 Dashboard
  # ────────────────────────────────────────
  brain_viz:
    build:
      context: ..
      dockerfile: brain_deploy/docker/Dockerfile.brain_viz
    image: brain-os/brain_viz:${BRAIN_VERSION:-latest}
    container_name: brain_viz
    restart: unless-stopped
    networks:
      - brain-net
    ports:
      - "${BRAIN_VIZ_PORT:-3000}:3000"
    environment:
      - NEXT_PUBLIC_WS_URL=${BRAIN_WS_URL:-ws://localhost:8765}
      - NEXT_PUBLIC_GRPC_WEB_URL=${BRAIN_GRPC_WEB_URL:-http://localhost:8080}
      - NEXT_PUBLIC_ROBOT_ID=${BRAIN_ROBOT_ID:-sim_robot_01}
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.5"
          memory: 256M
    logging: *default-logging
    depends_on:
      brain_ai:
        condition: service_healthy
    command: ["node", "server.js"]

  # ────────────────────────────────────────
  # envoy — gRPC-Web 反向代理
  # ────────────────────────────────────────
  envoy:
    build:
      context: ..
      dockerfile: brain_deploy/docker/Dockerfile.envoy
    image: brain-os/envoy:${BRAIN_VERSION:-latest}
    container_name: brain_envoy
    restart: unless-stopped
    networks:
      - brain-net
    ports:
      - "${BRAIN_ENVOY_PORT:-8080}:8080"
      - "${BRAIN_ENVOY_ADMIN_PORT:-9901}:9901"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.25"
          memory: 128M
    volumes:
      - envoy-logs:/var/log/envoy
    logging: *default-logging
    depends_on:
      - brain_ai
