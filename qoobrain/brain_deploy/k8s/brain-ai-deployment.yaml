# ============================================================
# Brain OS — Kubernetes Deployment: brain_ai
# ============================================================
# 特性：
#   - GPU 调度（nvidia.com/gpu: 1）
#   - HPA 自动扩缩（CPU 70% / 内存 80%）
#   - gRPC 健康检查
#   - Service 暴露 50051 (gRPC) + 8765 (WebSocket)
#   - 适用于 Jetson Orin ARM64
#
# 部署：
#   kubectl apply -f brain_deploy/k8s/brain-ai-deployment.yaml
# ============================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: brain-ai
  namespace: brain-os
  labels:
    app: brain-os
    component: brain-ai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: brain-os
      component: brain-ai
  template:
    metadata:
      labels:
        app: brain-os
        component: brain-ai
    spec:
      restartPolicy: Always
      nodeSelector:
        kubernetes.io/arch: arm64
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      containers:
        - name: brain-ai
          image: brain-os/brain_ai:latest
          imagePullPolicy: IfNotPresent
          command:
            - python
            - -m
            - brain_ai.server
            - --host
            - "0.0.0.0"
            - --port
            - "50051"
          ports:
            - name: grpc
              containerPort: 50051
              protocol: TCP
            - name: ws
              containerPort: 8765
              protocol: TCP
          env:
            - name: BRAIN_OS_ROBOT_ID
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: BRAIN_OS_LOG_LEVEL
              value: "INFO"
            - name: BRAIN_LLM_BACKEND
              value: "tensorrt"
            - name: BRAIN_LLM_TRT_ENGINE_DIR
              value: "/workspace/brain_models/llm/"
            - name: NVIDIA_VISIBLE_DEVICES
              value: "all"
          resources:
            requests:
              cpu: "2.0"
              memory: "4Gi"
              nvidia.com/gpu: "1"
            limits:
              cpu: "4.0"
              memory: "8Gi"
              nvidia.com/gpu: "1"
          volumeMounts:
            - name: model-cache
              mountPath: /workspace/brain_models
            - name: ai-logs
              mountPath: /workspace/logs
          livenessProbe:
            exec:
              command:
                - python
                - -c
                - "import grpc; ch=grpc.insecure_channel('localhost:50051'); grpc.channel_ready_future(ch).result(timeout=3)"
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            exec:
              command:
                - python
                - -c
                - "import grpc; ch=grpc.insecure_channel('localhost:50051'); grpc.channel_ready_future(ch).result(timeout=5)"
            initialDelaySeconds: 15
            periodSeconds: 5
            timeoutSeconds: 10
            failureThreshold: 3
      volumes:
        - name: model-cache
          persistentVolumeClaim:
            claimName: brain-models-pvc
        - name: ai-logs
          emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: brain-ai
  namespace: brain-os
  labels:
    app: brain-os
    component: brain-ai
spec:
  type: ClusterIP
  selector:
    app: brain-os
    component: brain-ai
  ports:
    - name: grpc
      port: 50051
      targetPort: 50051
      protocol: TCP
    - name: ws
      port: 8765
      targetPort: 8765
      protocol: TCP

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: brain-ai-hpa
  namespace: brain-os
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: brain-ai
  minReplicas: 1
  maxReplicas: 3
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: brain-models-pvc
  namespace: brain-os
spec:
  accessModes:
    - ReadOnlyMany
  resources:
    requests:
      storage: 20Gi
  storageClassName: local-path
