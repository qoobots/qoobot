version: "3.9"

# Brain OS 开发环境 Docker Compose
# 用法：make docker-up / docker compose up -d
#
# 服务端口：
#   brain_core  : （容器内，通过 ROS 2 DDS 通信）
#   brain_ai    : 50051 (gRPC)
#   brain_viz   : 3000  (HTTP)
#   envoy       : 8080  (gRPC-Web → brain_ai 代理)

networks:
  brain-net:
    driver: bridge

volumes:
  ros2-log:
  model-cache:

services:
  # ─────────────────────────────────────────
  # brain_core — C++17 ROS 2 实时控制节点
  # ─────────────────────────────────────────
  brain_core:
    build:
      context: .
      dockerfile: brain_deploy/docker/Dockerfile.brain_core
    image: brain-os/brain_core:dev
    container_name: brain_core
    restart: unless-stopped
    network_mode: host       # ROS 2 DDS 需要 host 网络
    environment:
      - ROS_DOMAIN_ID=42
      - BRAIN_ROBOT_ID=sim_robot_01
      - BRAIN_GRPC_BACKEND=brain_ai:50051
    volumes:
      - ./brain_core:/workspace/brain_core:ro
      - ros2-log:/root/.ros/log
    command: ["ros2", "launch", "brain_core", "brain_os.launch.py"]
    healthcheck:
      test: ["CMD", "ros2", "node", "list"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ─────────────────────────────────────────
  # brain_ai — Python gRPC AI 引擎
  # ─────────────────────────────────────────
  brain_ai:
    build:
      context: .
      dockerfile: brain_deploy/docker/Dockerfile.brain_ai
    image: brain-os/brain_ai:dev
    container_name: brain_ai
    restart: unless-stopped
    networks:
      - brain-net
    ports:
      - "50051:50051"   # gRPC
      - "8765:8765"     # WebSocket 事件流
    environment:
      - BRAIN_OS_ROBOT_ID=sim_robot_01
      - BRAIN_OS_LOG_LEVEL=INFO
      - BRAIN_LLM_BACKEND=stub   # stub | tensorrt | llama_cpp | api
      - BRAIN_LLM_API_KEY=${BRAIN_LLM_API_KEY:-}
    volumes:
      - ./brain_ai:/workspace/brain_ai:ro
      - model-cache:/workspace/brain_models
    command: ["python", "-m", "brain_ai.server", "--host", "0.0.0.0", "--port", "50051"]
    healthcheck:
      test: ["CMD", "python", "-c", "import grpc; ch=grpc.insecure_channel('localhost:50051'); print('ok')"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # brain_viz — Next.js 前端 Dashboard
  # ─────────────────────────────────────────
  brain_viz:
    build:
      context: .
      dockerfile: brain_deploy/docker/Dockerfile.brain_viz
    image: brain-os/brain_viz:dev
    container_name: brain_viz
    restart: unless-stopped
    networks:
      - brain-net
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_WS_URL=ws://localhost:8765
      - NEXT_PUBLIC_GRPC_WEB_URL=http://localhost:8080
      - NEXT_PUBLIC_ROBOT_ID=sim_robot_01
    volumes:
      - ./brain_viz:/workspace/brain_viz:ro
    depends_on:
      brain_ai:
        condition: service_healthy
    command: ["npm", "run", "dev"]

  # ─────────────────────────────────────────
  # envoy — gRPC-Web 反向代理
  # ─────────────────────────────────────────
  envoy:
    build:
      context: .
      dockerfile: brain_deploy/docker/Dockerfile.envoy
    image: brain-os/envoy:dev
    container_name: brain_envoy
    restart: unless-stopped
    networks:
      - brain-net
    ports:
      - "8080:8080"    # gRPC-Web（浏览器访问）
      - "9901:9901"    # Envoy 管理界面
    volumes:
      - ./brain_deploy/envoy/envoy.yaml:/etc/envoy/envoy.yaml:ro
    depends_on:
      - brain_ai
