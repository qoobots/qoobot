<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" fill="none">
  <defs>
    <linearGradient id="brainGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="50%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <linearGradient id="subGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#A78BFA"/>
    </linearGradient>
  </defs>

  <style>
    @media (prefers-color-scheme: dark) {
      .text-main { fill: #F8FAFC; }
      .text-sub { fill: #94A3B8; }
    }
    .text-main { fill: #1E293B; }
    .text-sub { fill: #64748B; }
  </style>

  <!-- Logo Icon: Brain + Circuit -->
  <g transform="translate(60, 50)">
    <!-- Outer hexagon / chip border -->
    <polygon points="50,4 96,28 96,76 50,100 4,76 4,28"
             fill="none" stroke="url(#brainGrad)" stroke-width="3" rx="2"/>

    <!-- Inner brain shape (simplified) -->
    <path d="M50 22 C35 22 22 30 22 42
             C22 52 28 58 28 58
             C28 58 22 62 22 70
             C22 82 35 88 50 88
             C65 88 78 82 78 70
             C78 62 72 58 72 58
             C72 58 78 52 78 42
             C78 30 65 22 50 22Z"
          fill="url(#brainGrad)" opacity="0.15" stroke="url(#brainGrad)" stroke-width="2.5"/>

    <!-- Neural connections (dots) -->
    <circle cx="50" cy="40" r="3" fill="#6366F1"/>
    <circle cx="38" cy="55" r="2.5" fill="#8B5CF6"/>
    <circle cx="62" cy="55" r="2.5" fill="#8B5CF6"/>
    <circle cx="44" cy="72" r="2.5" fill="#06B6D4"/>
    <circle cx="56" cy="72" r="2.5" fill="#06B6D4"/>

    <!-- Circuit traces -->
    <line x1="50" y1="40" x2="38" y2="55" stroke="#6366F1" stroke-width="1.5" opacity="0.6"/>
    <line x1="50" y1="40" x2="62" y2="55" stroke="#6366F1" stroke-width="1.5" opacity="0.6"/>
    <line x1="38" y1="55" x2="44" y2="72" stroke="#8B5CF6" stroke-width="1.5" opacity="0.6"/>
    <line x1="62" y1="55" x2="56" y2="72" stroke="#8B5CF6" stroke-width="1.5" opacity="0.6"/>

    <!-- Outer circuit nodes -->
    <circle cx="4" cy="52" r="2" fill="#6366F1" opacity="0.5"/>
    <circle cx="96" cy="52" r="2" fill="#06B6D4" opacity="0.5"/>
    <line x1="4" y1="52" x2="22" y2="52" stroke="#6366F1" stroke-width="1.5" opacity="0.4"/>
    <line x1="78" y1="52" x2="96" y2="52" stroke="#06B6D4" stroke-width="1.5" opacity="0.4"/>
  </g>

  <!-- Brand Name -->
  <g transform="translate(180, 60)">
    <text x="0" y="40" font-family="'Segoe UI', -apple-system, sans-serif" font-size="52" font-weight="800" fill="url(#textGrad)" letter-spacing="-1">
      Brain
    </text>
    <text x="190" y="40" font-family="'Segoe UI', -apple-system, sans-serif" font-size="52" font-weight="300" fill="#94A3B8" letter-spacing="-1">
      OS
    </text>
  </g>

  <!-- Subtitle -->
  <g transform="translate(180, 110)">
    <text x="0" y="0" font-family="'Segoe UI', -apple-system, sans-serif" font-size="16" font-weight="500" fill="url(#subGrad)" letter-spacing="2">
      EMBODIED INTELLIGENCE OS
    </text>
  </g>

  <!-- Decorative bottom line -->
  <g transform="translate(180, 135)">
    <rect x="0" y="0" width="180" height="2" rx="1" fill="url(#brainGrad)" opacity="0.3"/>
  </g>
</svg>
