site_name: Brain OS 文档
site_description: Brain OS — 具身智能机器人操作系统
site_author: Brain OS Team
site_url: https://brain-os.github.io/brain_docs
repo_url: https://github.com/brain-os/brain_os
repo_name: brain-os/brain_os
edit_uri: edit/main/brain_docs/docs/

docs_dir: docs
site_dir: site

theme:
  name: material
  custom_dir: overrides
  language: zh
  palette:
    - scheme: default
      primary: deep purple
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: 切换到暗色模式
    - scheme: slate
      primary: deep purple
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: 切换到亮色模式
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit
  icon:
    repo: fontawesome/brands/github
    logo: material/robot

plugins:
  - search:
      lang: zh
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: true
            docstring_style: google

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

nav:
  - 首页: index.md
  - 快速开始:
      - 安装: getting-started/installation.md
      - 快速上手: getting-started/quickstart.md
  - 用户指南:
      - Dashboard: user-guide/dashboard.md
      - 人在回路 (HITL): user-guide/hitl.md
      - 语音控制: user-guide/voice-control.md
  - Python SDK:
      - 概览: sdk/python-sdk.md
      - API 参考: sdk/api-reference.md
      - 示例代码: sdk/examples.md
  - 开发指南:
      - 架构概览: development/architecture.md
      - 模块说明: development/modules.md
      - 贡献指南: development/contributing.md
  - API 参考:
      - Protobuf 服务定义: api/proto-reference.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/brain-os/brain_os
  version:
    provider: mike

copyright: "Copyright &copy; 2024-2026 Brain OS Team — Apache 2.0 License"
