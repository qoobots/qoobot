<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 680" width="1000" height="680">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a2e"/>
      <stop offset="100%" style="stop-color:#12123a"/>
    </linearGradient>
    <linearGradient id="marsGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e65100"/>
      <stop offset="40%" style="stop-color:#bf360c"/>
      <stop offset="100%" style="stop-color:#3e2723"/>
    </linearGradient>
    <linearGradient id="domedGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4fc3f7;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#4fc3f7;stop-opacity:0.05"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <rect width="1000" height="680" fill="url(#bgGrad)"/>

  <!-- 标题 -->
  <text x="500" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#e0f7fa">火星殖民路线图</text>
  <text x="500" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#78909c">从首批机器人登陆到百万台规模的火星城市建造</text>

  <!-- 火星场景 -->
  <g transform="translate(500, 310)">
    <!-- 火星地平线 -->
    <ellipse cx="0" cy="80" rx="380" ry="60" fill="url(#marsGrad)" opacity="0.7"/>

    <!-- 星空背景 -->
    <circle cx="-280" cy="-120" r="1" fill="white" opacity="0.5"/>
    <circle cx="-180" cy="-80" r="0.8" fill="white" opacity="0.4"/>
    <circle cx="250" cy="-100" r="1.2" fill="white" opacity="0.6"/>
    <circle cx="300" cy="-50" r="0.7" fill="white" opacity="0.3"/>
    <circle cx="-100" cy="-140" r="1" fill="white" opacity="0.5"/>

    <!-- 地球（远处天空） -->
    <circle cx="-250" cy="-100" r="12" fill="#1565c0" opacity="0.6"/>
    <ellipse cx="-254" cy="-104" rx="4" ry="3" fill="#2e7d32" opacity="0.4"/>

    <!-- 太阳 -->
    <circle cx="250" cy="-90" r="18" fill="#fff176" opacity="0.15"/>
    <circle cx="250" cy="-90" r="12" fill="#fff176" opacity="0.25"/>

    <!-- 穹顶城市 -->
    <path d="M -80,20 Q -80,-30 0,-30 Q 80,-30 80,20" fill="url(#domedGrad)" stroke="#4fc3f7" stroke-width="1" opacity="0.5"/>
    <rect x="-85" y="18" width="170" height="6" fill="#1565c0" opacity="0.4"/>

    <!-- 穹顶内建筑 -->
    <rect x="-60" y="0" width="20" height="18" fill="#4fc3f7" opacity="0.2"/>
    <rect x="-30" y="-5" width="15" height="23" fill="#81c784" opacity="0.2"/>
    <rect x="10" y="-2" width="18" height="20" fill="#ffb74d" opacity="0.2"/>
    <rect x="40" y="3" width="15" height="15" fill="#ce93d8" opacity="0.2"/>

    <!-- 小型机器人（火星表面） -->
    <g transform="translate(-120, 10)" opacity="0.5">
      <rect x="-6" y="-10" width="12" height="10" rx="3" fill="#4fc3f7"/>
      <circle cx="-3" cy="-7" r="1.5" fill="white"/>
      <circle cx="3" cy="-7" r="1.5" fill="white"/>
      <rect x="-4" y="0" width="8" height="6" rx="2" fill="#1565c0"/>
    </g>
    <g transform="translate(140, 25)" opacity="0.4">
      <rect x="-5" y="-8" width="10" height="8" rx="2" fill="#81c784"/>
      <circle cx="-2" cy="-5" r="1" fill="white"/>
      <circle cx="2" cy="-5" r="1" fill="white"/>
      <rect x="-3" y="0" width="6" height="5" rx="1" fill="#2e7d32"/>
    </g>
    <g transform="translate(200, 15)" opacity="0.35">
      <rect x="-6" y="-10" width="12" height="10" rx="3" fill="#ffb74d"/>
      <circle cx="-3" cy="-7" r="1.5" fill="white"/>
      <circle cx="3" cy="-7" r="1.5" fill="white"/>
      <rect x="-4" y="0" width="8" height="6" rx="2" fill="#e65100"/>
    </g>

    <!-- 太阳能板阵列 -->
    <rect x="-200" y="5" width="15" height="25" rx="1" fill="#1565c0" opacity="0.3"/>
    <rect x="-180" y="8" width="15" height="25" rx="1" fill="#1565c0" opacity="0.25"/>
    <rect x="-160" y="5" width="15" height="25" rx="1" fill="#1565c0" opacity="0.3"/>

    <!-- 天线 -->
    <line x1="40" y1="-30" x2="40" y2="-55" stroke="#4fc3f7" stroke-width="0.8" opacity="0.4"/>
    <circle cx="40" cy="-57" r="2" fill="#4fc3f7" opacity="0.4"/>
    <line x1="40" y1="-57" x2="70" y2="-70" stroke="#4fc3f7" stroke-width="0.5" opacity="0.2"/>
  </g>

  <!-- 时间线 -->
  <g transform="translate(50, 430)">
    <!-- 主线 -->
    <line x1="30" y1="0" x2="870" y2="0" stroke="#4fc3f7" stroke-width="2" opacity="0.4"/>

    <!-- 时间节点 -->
    <circle cx="60" cy="0" r="8" fill="#4fc3f7" opacity="0.8" filter="url(#glow)"/>
    <circle cx="220" cy="0" r="8" fill="#81c784" opacity="0.8" filter="url(#glow)"/>
    <circle cx="380" cy="0" r="8" fill="#ffb74d" opacity="0.8" filter="url(#glow)"/>
    <circle cx="540" cy="0" r="8" fill="#ef5350" opacity="0.8" filter="url(#glow)"/>
    <circle cx="700" cy="0" r="8" fill="#ce93d8" opacity="0.8" filter="url(#glow)"/>

    <!-- 年份 -->
    <text x="60" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#4fc3f7">2035</text>
    <text x="220" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#81c784">2040</text>
    <text x="380" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffb74d">2045</text>
    <text x="540" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ef5350">2050</text>
    <text x="700" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ce93d8">2060</text>

    <!-- 节点详情 - 上方 -->
    <g font-family="Arial, sans-serif" font-size="9">
      <rect x="-10" y="-65" width="140" height="52" rx="6" fill="#1a237e" fill-opacity="0.7" stroke="#4fc3f7" stroke-width="0.5"/>
      <text x="60" y="-50" text-anchor="middle" fill="#b3e5fc" font-weight="bold">100 台机器人</text>
      <text x="60" y="-37" text-anchor="middle" fill="#78909c">选址勘探 · 地质采样</text>
      <text x="60" y="-24" text-anchor="middle" fill="#78909c">太阳能阵列 + 通讯基站</text>

      <rect x="150" y="-65" width="140" height="52" rx="6" fill="#1a237e" fill-opacity="0.7" stroke="#81c784" stroke-width="0.5"/>
      <text x="220" y="-50" text-anchor="middle" fill="#c8e6c9" font-weight="bold">1,000 台机器人</text>
      <text x="220" y="-37" text-anchor="middle" fill="#78909c">地下居住舱 · 水冰开采</text>
      <text x="220" y="-24" text-anchor="middle" fill="#78909c">3D 打印建材</text>

      <rect x="310" y="-65" width="140" height="52" rx="6" fill="#1a237e" fill-opacity="0.7" stroke="#ffb74d" stroke-width="0.5"/>
      <text x="380" y="-50" text-anchor="middle" fill="#ffe0b2" font-weight="bold">10,000 台机器人</text>
      <text x="380" y="-37" text-anchor="middle" fill="#78909c">生态穹顶 · 食物系统</text>
      <text x="380" y="-24" text-anchor="middle" fill="#78909c">MOXIE 规模化制氧</text>

      <rect x="470" y="-65" width="140" height="52" rx="6" fill="#1a237e" fill-opacity="0.7" stroke="#ef5350" stroke-width="0.5"/>
      <text x="540" y="-50" text-anchor="middle" fill="#ffcdd2" font-weight="bold">100,000 台机器人</text>
      <text x="540" y="-37" text-anchor="middle" fill="#78909c">火星城市一期完工</text>
      <text x="540" y="-24" text-anchor="middle" fill="#78909c">首批 1,000 人抵达</text>

      <rect x="630" y="-65" width="140" height="52" rx="6" fill="#1a237e" fill-opacity="0.7" stroke="#ce93d8" stroke-width="0.5"/>
      <text x="700" y="-50" text-anchor="middle" fill="#e1bee7" font-weight="bold">1,000,000 台机器人</text>
      <text x="700" y="-37" text-anchor="middle" fill="#78909c">10 万人口 · 就地复制</text>
      <text x="700" y="-24" text-anchor="middle" fill="#78909c">地壳改造启动</text>
    </g>

    <!-- 下方标签 -->
    <g font-family="Arial, sans-serif" font-size="9" text-anchor="middle">
      <text x="60" y="45" fill="#78909c">探索期</text>
      <text x="220" y="45" fill="#78909c">基建期</text>
      <text x="380" y="45" fill="#78909c">生态期</text>
      <text x="540" y="45" fill="#78909c">移民期</text>
      <text x="700" y="45" fill="#78909c">扩张期</text>
    </g>
  </g>

  <!-- 底部关键能力 -->
  <g transform="translate(50, 580)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#e0f7fa">机器人火星关键能力</text>
    <g font-family="Arial, sans-serif" font-size="9" fill="#78909c">
      <rect x="0" y="8" width="170" height="32" rx="4" fill="#1a237e" fill-opacity="0.5" stroke="#546e7a" stroke-width="0.5"/>
      <text x="10" y="23" fill="#b3e5fc">🪨 ISRU 就地取材</text>
      <text x="10" y="35" fill="#78909c">火星土壤 → 建材/金属/氧气</text>

      <rect x="180" y="8" width="170" height="32" rx="4" fill="#1a237e" fill-opacity="0.5" stroke="#546e7a" stroke-width="0.5"/>
      <text x="190" y="23" fill="#c8e6c9">🤖 自主建造</text>
      <text x="190" y="35" fill="#78909c">群体 AI · 无地球指令</text>

      <rect x="360" y="8" width="170" height="32" rx="4" fill="#1a237e" fill-opacity="0.5" stroke="#546e7a" stroke-width="0.5"/>
      <text x="370" y="23" fill="#ffe0b2">🔄 自我复制</text>
      <text x="370" y="35" fill="#78909c">80% 零件就地制造</text>

      <rect x="540" y="8" width="170" height="32" rx="4" fill="#1a237e" fill-opacity="0.5" stroke="#546e7a" stroke-width="0.5"/>
      <text x="550" y="23" fill="#ffcdd2">⚡ 能源获取</text>
      <text x="550" y="35" fill="#78909c">太阳能 + 小型核反应堆</text>

      <rect x="720" y="8" width="170" height="32" rx="4" fill="#1a237e" fill-opacity="0.5" stroke="#546e7a" stroke-width="0.5"/>
      <text x="730" y="23" fill="#e1bee7">🛡️ 辐射防护</text>
      <text x="730" y="35" fill="#78909c">地下建造 + 水冰屏蔽</text>
    </g>
  </g>
</svg>
