<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 700" width="1000" height="700">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a2e"/>
      <stop offset="100%" style="stop-color:#12123a"/>
    </linearGradient>
    <linearGradient id="topCard" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ce93d8;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#ce93d8;stop-opacity:0.05"/>
    </linearGradient>
    <linearGradient id="midCard1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4fc3f7;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#4fc3f7;stop-opacity:0.03"/>
    </linearGradient>
    <linearGradient id="midCard2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#81c784;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#81c784;stop-opacity:0.03"/>
    </linearGradient>
    <linearGradient id="midCard3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffb74d;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#ffb74d;stop-opacity:0.03"/>
    </linearGradient>
    <linearGradient id="botCard1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ef5350;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#ef5350;stop-opacity:0.02"/>
    </linearGradient>
    <linearGradient id="botCard2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#29b6f6;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#29b6f6;stop-opacity:0.02"/>
    </linearGradient>
    <linearGradient id="botCard3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#66bb6a;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#66bb6a;stop-opacity:0.02"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="1000" height="700" fill="url(#bg)"/>

  <!-- 标题 -->
  <text x="500" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#e0f7fa">QooBot 十大愿景总览</text>
  <line x1="350" y1="50" x2="650" y2="50" stroke="#4fc3f7" stroke-width="1" opacity="0.3"/>

  <!-- ===== 第一层：星辰大海 ===== -->
  <g transform="translate(500, 80)">
    <rect x="-150" y="-25" width="300" height="50" rx="25" fill="url(#topCard)" stroke="#ce93d8" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="0" y="3" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#e1bee7">🌟 星辰大海</text>
  </g>

  <!-- 连线：第一层到第二层 -->
  <line x1="500" y1="105" x2="500" y2="145" stroke="#ce93d8" stroke-width="1.5" opacity="0.4"/>
  <line x1="500" y1="145" x2="200" y2="145" stroke="#ce93d8" stroke-width="1.5" opacity="0.4"/>
  <line x1="500" y1="145" x2="500" y2="145" stroke="#ce93d8" stroke-width="1.5" opacity="0.4"/>
  <line x1="500" y1="145" x2="800" y2="145" stroke="#ce93d8" stroke-width="1.5" opacity="0.4"/>
  <line x1="200" y1="145" x2="200" y2="165" stroke="#ce93d8" stroke-width="1.5" opacity="0.4"/>
  <line x1="500" y1="145" x2="500" y2="165" stroke="#ce93d8" stroke-width="1.5" opacity="0.4"/>
  <line x1="800" y1="145" x2="800" y2="165" stroke="#ce93d8" stroke-width="1.5" opacity="0.4"/>

  <!-- ===== 第二层：太空文明 / 极限环境 / 知识永续 ===== -->
  <g transform="translate(200, 175)">
    <rect x="-130" y="-20" width="260" height="40" rx="8" fill="url(#midCard1)" stroke="#4fc3f7" stroke-width="1" filter="url(#shadow)"/>
    <text x="0" y="5" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#b3e5fc">🚀 太空文明</text>
    <text x="0" y="22" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#78909c">愿景 ⑥ ⑦ ⑧</text>
  </g>
  <g transform="translate(500, 175)">
    <rect x="-130" y="-20" width="260" height="40" rx="8" fill="url(#midCard2)" stroke="#81c784" stroke-width="1" filter="url(#shadow)"/>
    <text x="0" y="5" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#c8e6c9">🏔️ 极限环境</text>
    <text x="0" y="22" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#78909c">愿景 ⑤</text>
  </g>
  <g transform="translate(800, 175)">
    <rect x="-130" y="-20" width="260" height="40" rx="8" fill="url(#midCard3)" stroke="#ffb74d" stroke-width="1" filter="url(#shadow)"/>
    <text x="0" y="5" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#ffe0b2">🧠 知识永续</text>
    <text x="0" y="22" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#78909c">愿景 ④</text>
  </g>

  <!-- 连线：第二层到第三层 -->
  <line x1="200" y1="215" x2="200" y2="255" stroke="#4fc3f7" stroke-width="1" opacity="0.3"/>
  <line x1="500" y1="215" x2="500" y2="255" stroke="#81c784" stroke-width="1" opacity="0.3"/>
  <line x1="800" y1="215" x2="800" y2="255" stroke="#ffb74d" stroke-width="1" opacity="0.3"/>

  <!-- 汇聚线 -->
  <line x1="200" y1="255" x2="500" y2="280" stroke="#4fc3f7" stroke-width="1" opacity="0.25"/>
  <line x1="500" y1="255" x2="500" y2="280" stroke="#81c784" stroke-width="1" opacity="0.25"/>
  <line x1="800" y1="255" x2="500" y2="280" stroke="#ffb74d" stroke-width="1" opacity="0.25"/>

  <line x1="500" y1="280" x2="200" y2="300" stroke="#78909c" stroke-width="1" opacity="0.3"/>
  <line x1="500" y1="280" x2="500" y2="300" stroke="#78909c" stroke-width="1" opacity="0.3"/>
  <line x1="500" y1="280" x2="800" y2="300" stroke="#78909c" stroke-width="1" opacity="0.3"/>
  <line x1="200" y1="300" x2="200" y2="320" stroke="#78909c" stroke-width="1" opacity="0.3"/>
  <line x1="500" y1="300" x2="500" y2="320" stroke="#78909c" stroke-width="1" opacity="0.3"/>
  <line x1="800" y1="300" x2="800" y2="320" stroke="#78909c" stroke-width="1" opacity="0.3"/>

  <!-- ===== 第三层：产业革命 / 社会重构 / 个体解放 ===== -->
  <g transform="translate(200, 330)">
    <rect x="-130" y="-35" width="260" height="70" rx="8" fill="url(#botCard1)" stroke="#ef5350" stroke-width="1" filter="url(#shadow)"/>
    <text x="0" y="-10" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#ffcdd2">🏭 产业革命</text>
    <text x="0" y="10" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#b0bec5">全岗位替代 · 万倍生产力</text>
    <text x="0" y="28" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#78909c">愿景 ① ② ③</text>
  </g>
  <g transform="translate(500, 330)">
    <rect x="-130" y="-35" width="260" height="70" rx="8" fill="url(#botCard2)" stroke="#29b6f6" stroke-width="1" filter="url(#shadow)"/>
    <text x="0" y="-10" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#b3e5fc">🔄 社会重构</text>
    <text x="0" y="10" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#b0bec5">机器人经济 · 后稀缺时代</text>
    <text x="0" y="28" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#78909c">愿景 ⑩</text>
  </g>
  <g transform="translate(800, 330)">
    <rect x="-130" y="-35" width="260" height="70" rx="8" fill="url(#botCard3)" stroke="#66bb6a" stroke-width="1" filter="url(#shadow)"/>
    <text x="0" y="-10" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#c8e6c9">🕊️ 个体解放</text>
    <text x="0" y="10" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#b0bec5">意识上传 · 第二身体</text>
    <text x="0" y="28" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#78909c">愿景 ④</text>
  </g>

  <!-- 底部连线到 QooBot 基石 -->
  <line x1="200" y1="400" x2="500" y2="450" stroke="#78909c" stroke-width="0.8" opacity="0.2"/>
  <line x1="500" y1="400" x2="500" y2="450" stroke="#78909c" stroke-width="0.8" opacity="0.2"/>
  <line x1="800" y1="400" x2="500" y2="450" stroke="#78909c" stroke-width="0.8" opacity="0.2"/>

  <!-- 基石：QooBot -->
  <g transform="translate(500, 465)">
    <rect x="-180" y="-22" width="360" height="44" rx="22" fill="#1a237e" stroke="#4fc3f7" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="0" y="3" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#e0f7fa">⚙️ QooBot 开源人形机器人平台</text>
    <text x="0" y="19" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#90a4ae">所有愿景的起点——我们写的每一行代码，都是迈向星辰大海的一小步</text>
  </g>

  <!-- 底部时间线 -->
  <g transform="translate(500, 540)">
    <line x1="-400" y1="0" x2="400" y2="0" stroke="#4fc3f7" stroke-width="1" opacity="0.2"/>
    <circle cx="-350" cy="0" r="4" fill="#4fc3f7" opacity="0.4"/>
    <circle cx="-200" cy="0" r="4" fill="#81c784" opacity="0.4"/>
    <circle cx="-50" cy="0" r="4" fill="#ffb74d" opacity="0.4"/>
    <circle cx="100" cy="0" r="4" fill="#ef5350" opacity="0.4"/>
    <circle cx="250" cy="0" r="4" fill="#ce93d8" opacity="0.4"/>
    <circle cx="350" cy="0" r="4" fill="#e0f7fa" opacity="0.3"/>
    <text x="-350" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#78909c">2026</text>
    <text x="-200" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#78909c">2030</text>
    <text x="-50" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#78909c">2040</text>
    <text x="100" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#78909c">2050</text>
    <text x="250" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#78909c">2100</text>
    <text x="350" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#78909c">3000+</text>
  </g>

  <!-- 底部标签 -->
  <text x="500" y="610" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#546e7a">开源平台启动 → 全岗位替代 → 万倍生产力 → 火星殖民 → 戴森球启动 → 星际殖民 → 万物共生</text>
</svg>
