<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500" width="1200" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a2e"/>
      <stop offset="40%" style="stop-color:#0d1b3e"/>
      <stop offset="70%" style="stop-color:#1a1a4e"/>
      <stop offset="100%" style="stop-color:#0a0a2e"/>
    </linearGradient>
    <linearGradient id="starGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#8888cc"/>
    </linearGradient>
    <linearGradient id="robotGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4fc3f7"/>
      <stop offset="50%" style="stop-color:#2196f3"/>
      <stop offset="100%" style="stop-color:#1565c0"/>
    </linearGradient>
    <linearGradient id="orbitGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4fc3f7;stop-opacity:0"/>
      <stop offset="30%" style="stop-color:#4fc3f7;stop-opacity:0.6"/>
      <stop offset="70%" style="stop-color:#ce93d8;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#ce93d8;stop-opacity:0"/>
    </linearGradient>
    <radialGradient id="glowGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#4fc3f7;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#4fc3f7;stop-opacity:0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="1200" height="500" fill="url(#bgGrad)"/>

  <!-- 星空背景 -->
  <g fill="url(#starGrad)" opacity="0.6">
    <circle cx="80" cy="45" r="1.5"/><circle cx="150" cy="120" r="1"/><circle cx="230" cy="30" r="1.8"/>
    <circle cx="340" cy="80" r="1"/><circle cx="450" cy="50" r="1.5"/><circle cx="520" cy="110" r="0.8"/>
    <circle cx="680" cy="35" r="1.2"/><circle cx="750" cy="90" r="1"/><circle cx="850" cy="45" r="1.5"/>
    <circle cx="920" cy="130" r="0.8"/><circle cx="1000" cy="60" r="1.3"/><circle cx="1080" cy="100" r="1"/>
    <circle cx="1150" cy="40" r="1.6"/><circle cx="200" cy="200" r="0.8"/><circle cx="950" cy="180" r="1"/>
    <circle cx="60" cy="300" r="1.2"/><circle cx="1120" cy="250" r="0.9"/>
    <circle cx="180" cy="400" r="1"/><circle cx="1020" cy="380" r="1.1"/>
    <circle cx="300" cy="420" r="0.8"/><circle cx="880" cy="430" r="0.7"/>
    <circle cx="500" cy="440" r="1.3"/><circle cx="700" cy="410" r="0.9"/>
  </g>

  <!-- 地球 - 左下角 -->
  <g transform="translate(150, 320)">
    <circle cx="0" cy="0" r="65" fill="#1565c0" opacity="0.15"/>
    <circle cx="0" cy="0" r="55" fill="#1a237e" opacity="0.3"/>
    <!-- 简化大陆轮廓 -->
    <ellipse cx="-15" cy="-20" rx="30" ry="20" fill="#2e7d32" opacity="0.5"/>
    <ellipse cx="20" cy="10" rx="25" ry="18" fill="#2e7d32" opacity="0.4"/>
    <ellipse cx="-5" cy="25" rx="15" ry="10" fill="#2e7d32" opacity="0.35"/>
    <ellipse cx="10" cy="-30" rx="12" ry="15" fill="#2e7d32" opacity="0.45"/>
    <circle cx="0" cy="0" r="55" fill="none" stroke="#4fc3f7" stroke-width="0.8" opacity="0.4"/>
  </g>

  <!-- 机器人剪影 - 中心偏右 -->
  <g transform="translate(720, 170)" filter="url(#softGlow)">
    <!-- 机器人身体发光 -->
    <ellipse cx="0" cy="60" rx="40" ry="25" fill="url(#glowGrad)"/>

    <!-- 头部 -->
    <rect x="-28" y="-80" width="56" height="50" rx="8" fill="url(#robotGrad)" opacity="0.9"/>
    <!-- 眼睛 -->
    <circle cx="-12" cy="-58" r="6" fill="#e0f7fa" opacity="0.9"/>
    <circle cx="12" cy="-58" r="6" fill="#e0f7fa" opacity="0.9"/>
    <circle cx="-12" cy="-58" r="3" fill="#ffffff"/>
    <circle cx="12" cy="-58" r="3" fill="#ffffff"/>
    <!-- 天线 -->
    <line x1="0" y1="-80" x2="0" y2="-95" stroke="#4fc3f7" stroke-width="2" opacity="0.7"/>
    <circle cx="0" cy="-98" r="4" fill="#ce93d8" opacity="0.8"/>

    <!-- 脖子 -->
    <rect x="-6" y="-30" width="12" height="10" rx="2" fill="#1565c0"/>

    <!-- 躯干 -->
    <rect x="-35" y="-20" width="70" height="85" rx="10" fill="url(#robotGrad)" opacity="0.85"/>
    <!-- 胸部核心 -->
    <circle cx="0" cy="15" r="18" fill="#0d1b3e" opacity="0.6"/>
    <circle cx="0" cy="15" r="12" fill="#4fc3f7" opacity="0.4"/>
    <circle cx="0" cy="15" r="6" fill="#e0f7fa" opacity="0.6"/>
    <!-- 胸部线条 -->
    <line x1="-25" y1="40" x2="25" y2="40" stroke="#1565c0" stroke-width="1.5" opacity="0.5"/>
    <line x1="-20" y1="50" x2="20" y2="50" stroke="#1565c0" stroke-width="1.5" opacity="0.5"/>

    <!-- 左臂 -->
    <rect x="-55" y="-15" width="20" height="65" rx="8" fill="url(#robotGrad)" opacity="0.8"/>
    <!-- 左前臂 -->
    <rect x="-50" y="50" width="16" height="55" rx="6" fill="url(#robotGrad)" opacity="0.75"/>
    <!-- 左手 -->
    <circle cx="-42" cy="112" r="10" fill="#1565c0" opacity="0.7"/>

    <!-- 右臂 -->
    <rect x="35" y="-15" width="20" height="65" rx="8" fill="url(#robotGrad)" opacity="0.8"/>
    <!-- 右前臂 -->
    <rect x="34" y="50" width="16" height="55" rx="6" fill="url(#robotGrad)" opacity="0.75"/>
    <!-- 右手 -->
    <circle cx="42" cy="112" r="10" fill="#1565c0" opacity="0.7"/>

    <!-- 左腿 -->
    <rect x="-25" y="65" width="22" height="65" rx="8" fill="url(#robotGrad)" opacity="0.8"/>
    <!-- 左脚 -->
    <rect x="-30" y="122" width="32" height="14" rx="5" fill="#1565c0" opacity="0.7"/>

    <!-- 右腿 -->
    <rect x="3" y="65" width="22" height="65" rx="8" fill="url(#robotGrad)" opacity="0.8"/>
    <!-- 右脚 -->
    <rect x="-2" y="122" width="32" height="14" rx="5" fill="#1565c0" opacity="0.7"/>
  </g>

  <!-- 轨道环 -->
  <ellipse cx="720" cy="250" rx="220" ry="220" fill="none" stroke="url(#orbitGrad)" stroke-width="1.5" opacity="0.4" transform="rotate(-20, 720, 250)"/>
  <ellipse cx="720" cy="250" rx="280" ry="200" fill="none" stroke="url(#orbitGrad)" stroke-width="1" opacity="0.25" transform="rotate(15, 720, 250)"/>

  <!-- 轨道上的小点 -->
  <circle cx="510" cy="180" r="4" fill="#4fc3f7" opacity="0.6"/>
  <circle cx="550" cy="420" r="3" fill="#ce93d8" opacity="0.5"/>
  <circle cx="900" cy="140" r="3.5" fill="#4fc3f7" opacity="0.5"/>

  <!-- 标题文字 -->
  <text x="50" y="130" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#e0f7fa" filter="url(#glow)">QooBot</text>
  <text x="50" y="185" font-family="Arial, sans-serif" font-size="28" font-weight="300" fill="#4fc3f7" letter-spacing="6">未来愿景</text>

  <!-- 副标题 -->
  <text x="50" y="230" font-family="Arial, sans-serif" font-size="15" fill="#90a4ae" letter-spacing="2">FROM EARTH TO STARS</text>

  <!-- 分隔线 -->
  <line x1="50" y1="250" x2="350" y2="250" stroke="#4fc3f7" stroke-width="1.5" opacity="0.4"/>

  <!-- 底部标签 -->
  <g font-family="Arial, sans-serif" font-size="11" fill="#78909c">
    <text x="50" y="290">人形机器人 · 开源平台 · 星际文明</text>
    <text x="50" y="310">Humanoid Robot · Open Source · Interstellar Civilization</text>
  </g>

  <!-- 从地球到机器人的连接线 -->
  <path d="M 215,320 Q 350,280 450,250 Q 550,220 650,210" fill="none" stroke="#4fc3f7" stroke-width="1" opacity="0.3" stroke-dasharray="4,4"/>

  <!-- 右上角装饰 -->
  <g transform="translate(1050, 80)" opacity="0.15">
    <circle cx="0" cy="0" r="30" fill="none" stroke="#4fc3f7" stroke-width="1"/>
    <circle cx="0" cy="0" r="20" fill="none" stroke="#4fc3f7" stroke-width="0.5"/>
    <line x1="-25" y1="0" x2="25" y2="0" stroke="#4fc3f7" stroke-width="0.5"/>
    <line x1="0" y1="-25" x2="0" y2="25" stroke="#4fc3f7" stroke-width="0.5"/>
  </g>
</svg>
