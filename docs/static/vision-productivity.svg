<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" width="1000" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a2e"/>
      <stop offset="100%" style="stop-color:#12123a"/>
    </linearGradient>
    <linearGradient id="curveGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4fc3f7;stop-opacity:0.3"/>
      <stop offset="50%" style="stop-color:#81c784;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#ce93d8;stop-opacity:0.7"/>
    </linearGradient>
    <linearGradient id="areaGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4fc3f7;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#4fc3f7;stop-opacity:0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1000" height="500" fill="url(#bgGrad)"/>

  <!-- 标题 -->
  <text x="500" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#e0f7fa">万倍生产力跃迁</text>
  <text x="500" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#78909c">机器人规模部署驱动的文明级生产力跃升</text>

  <!-- 坐标轴区域 -->
  <g transform="translate(100, 80)">
    <!-- Y 轴 -->
    <line x1="0" y1="350" x2="0" y2="30" stroke="#546e7a" stroke-width="1"/>
    <!-- X 轴 -->
    <line x1="0" y1="350" x2="780" y2="350" stroke="#546e7a" stroke-width="1"/>

    <!-- Y 轴标签 -->
    <text x="-10" y="40" text-anchor="end" font-family="Arial, sans-serif" font-size="10" fill="#78909c">10,000×</text>
    <text x="-10" y="110" text-anchor="end" font-family="Arial, sans-serif" font-size="10" fill="#78909c">1,000×</text>
    <text x="-10" y="190" text-anchor="end" font-family="Arial, sans-serif" font-size="10" fill="#78909c">100×</text>
    <text x="-10" y="270" text-anchor="end" font-family="Arial, sans-serif" font-size="10" fill="#78909c">10×</text>
    <text x="-10" y="350" text-anchor="end" font-family="Arial, sans-serif" font-size="10" fill="#78909c">1×</text>

    <!-- Y 轴网格线 -->
    <line x1="0" y1="40" x2="780" y2="40" stroke="#546e7a" stroke-width="0.5" opacity="0.15" stroke-dasharray="4,4"/>
    <line x1="0" y1="110" x2="780" y2="110" stroke="#546e7a" stroke-width="0.5" opacity="0.15" stroke-dasharray="4,4"/>
    <line x1="0" y1="190" x2="780" y2="190" stroke="#546e7a" stroke-width="0.5" opacity="0.15" stroke-dasharray="4,4"/>
    <line x1="0" y1="270" x2="780" y2="270" stroke="#546e7a" stroke-width="0.5" opacity="0.15" stroke-dasharray="4,4"/>

    <!-- X 轴标签 -->
    <text x="80" y="370" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#78909c">2030</text>
    <text x="230" y="370" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#78909c">2040</text>
    <text x="380" y="370" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#78909c">2050</text>
    <text x="530" y="370" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#78909c">2060</text>
    <text x="680" y="370" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#78909c">2080</text>

    <!-- X 轴刻度线 -->
    <line x1="80" y1="350" x2="80" y2="356" stroke="#546e7a" stroke-width="1"/>
    <line x1="230" y1="350" x2="230" y2="356" stroke="#546e7a" stroke-width="1"/>
    <line x1="380" y1="350" x2="380" y2="356" stroke="#546e7a" stroke-width="1"/>
    <line x1="530" y1="350" x2="530" y2="356" stroke="#546e7a" stroke-width="1"/>
    <line x1="680" y1="350" x2="680" y2="356" stroke="#546e7a" stroke-width="1"/>

    <!-- 生产力曲线（指数增长） -->
    <!-- 2026: ~350, 2030: ~310, 2040: ~240, 2050: ~140, 2060: ~60, 2080: ~30 -->
    <path d="M 20,345 Q 80,310 160,240 T 380,120 T 600,40 T 750,20"
          fill="none" stroke="url(#curveGrad)" stroke-width="3" filter="url(#glow)"/>

    <!-- 面积填充 -->
    <path d="M 20,345 Q 80,310 160,240 T 380,120 T 600,40 T 750,20 L 750,350 Z"
          fill="url(#areaGrad)"/>

    <!-- 数据点 -->
    <circle cx="20" cy="345" r="5" fill="#4fc3f7" opacity="0.8"/>
    <circle cx="160" cy="240" r="5" fill="#81c784" opacity="0.8"/>
    <circle cx="380" cy="120" r="5" fill="#ffb74d" opacity="0.8"/>
    <circle cx="600" cy="40" r="5" fill="#ce93d8" opacity="0.8"/>

    <!-- 标注 -->
    <g font-family="Arial, sans-serif" font-size="9" fill="#b0bec5">
      <!-- 机器人数量标注 -->
      <rect x="130" y="225" width="120" height="36" rx="4" fill="#1a237e" fill-opacity="0.7" stroke="#81c784" stroke-width="0.5"/>
      <text x="140" y="240" fill="#c8e6c9">1 万台机器人</text>
      <text x="140" y="253" fill="#78909c">农业/制造部署</text>

      <rect x="340" y="105" width="140" height="36" rx="4" fill="#1a237e" fill-opacity="0.7" stroke="#ffb74d" stroke-width="0.5"/>
      <text x="350" y="120" fill="#ffe0b2">100 万台机器人</text>
      <text x="350" y="133" fill="#78909c">全行业覆盖 · 自复制</text>

      <rect x="550" y="25" width="140" height="36" rx="4" fill="#1a237e" fill-opacity="0.7" stroke="#ce93d8" stroke-width="0.5"/>
      <text x="560" y="40" fill="#e1bee7">1 亿台机器人</text>
      <text x="560" y="53" fill="#78909c">太空建造 · 戴森球</text>
    </g>

    <!-- 阶段标签 -->
    <g font-family="Arial, sans-serif" font-size="10" text-anchor="middle">
      <text x="80" y="390" fill="#4fc3f7" font-weight="bold">替代期</text>
      <text x="80" y="404" fill="#78909c">全岗位替代</text>

      <text x="230" y="390" fill="#81c784" font-weight="bold">复制期</text>
      <text x="230" y="404" fill="#78909c">机器人制造机器人</text>

      <text x="380" y="390" fill="#ffb74d" font-weight="bold">爆发期</text>
      <text x="380" y="404" fill="#78909c">万倍生产力</text>

      <text x="530" y="390" fill="#ce93d8" font-weight="bold">星际期</text>
      <text x="530" y="404" fill="#78909c">太空文明</text>
    </g>

    <!-- Y 轴标题 -->
    <text x="-55" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#78909c" transform="rotate(-90, -55, 190)">生产力倍率（相对于2026）</text>
  </g>

  <!-- 图例 -->
  <g transform="translate(750, 100)">
    <rect x="0" y="0" width="140" height="100" rx="6" fill="#1a237e" fill-opacity="0.5" stroke="#546e7a" stroke-width="0.5"/>
    <text x="70" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#e0f7fa">关键指标</text>
    <line x1="10" y1="28" x2="130" y2="28" stroke="#4fc3f7" stroke-width="0.5" opacity="0.3"/>

    <circle cx="20" cy="45" r="4" fill="#4fc3f7"/>
    <text x="30" y="49" font-family="Arial, sans-serif" font-size="9" fill="#b0bec5">人均 GDP</text>

    <circle cx="20" cy="62" r="4" fill="#81c784"/>
    <text x="30" y="66" font-family="Arial, sans-serif" font-size="9" fill="#b0bec5">机器人规模</text>

    <circle cx="20" cy="79" r="4" fill="#ce93d8"/>
    <text x="30" y="83" font-family="Arial, sans-serif" font-size="9" fill="#b0bec5">能源产出</text>
  </g>
</svg>
