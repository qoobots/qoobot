<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 620" width="1000" height="620">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#020210"/>
      <stop offset="50%" style="stop-color:#0a0a2e"/>
      <stop offset="100%" style="stop-color:#020210"/>
    </linearGradient>
    <radialGradient id="starGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#fff176;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#fff176;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="galaxyCore" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.15"/>
      <stop offset="30%" style="stop-color:#ce93d8;stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:#ce93d8;stop-opacity:0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="bigGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1000" height="620" fill="url(#bgGrad)"/>

  <!-- 标题 -->
  <text x="500" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#e0f7fa">星际文明 · 银河殖民波</text>
  <text x="500" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#78909c">冯·诺依曼探测器模式 —— 100万年内覆盖整个银河系</text>

  <!-- 银河系背景 -->
  <g transform="translate(500, 280)">
    <!-- 银河椭圆背景 -->
    <ellipse cx="0" cy="0" rx="380" ry="160" fill="url(#galaxyCore)" opacity="0.5"/>
    <ellipse cx="0" cy="0" rx="380" ry="160" fill="none" stroke="#4fc3f7" stroke-width="0.5" opacity="0.15"/>
    <ellipse cx="0" cy="0" rx="250" ry="100" fill="none" stroke="#ce93d8" stroke-width="0.5" opacity="0.1"/>

    <!-- 旋臂（简化） -->
    <path d="M 0,0 Q 80,-60 200,-80 Q 320,-90 380,-30" fill="none" stroke="#4fc3f7" stroke-width="0.8" opacity="0.12"/>
    <path d="M 0,0 Q -80,60 -200,80 Q -320,90 -380,30" fill="none" stroke="#4fc3f7" stroke-width="0.8" opacity="0.12"/>
    <path d="M 0,0 Q 100,50 250,60 Q 350,50 380,20" fill="none" stroke="#ce93d8" stroke-width="0.6" opacity="0.08"/>
    <path d="M 0,0 Q -100,-50 -250,-60 Q -350,-50 -380,-20" fill="none" stroke="#ce93d8" stroke-width="0.6" opacity="0.08"/>

    <!-- 恒星系节点 -->
    <!-- 地球/太阳系 -->
    <circle cx="0" cy="0" r="8" fill="#fff176" opacity="0.8" filter="url(#glow)"/>
    <circle cx="0" cy="0" r="12" fill="url(#starGlow)"/>
    <text x="0" y="-18" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#fff176" filter="url(#glow)">🌍 地球</text>

    <!-- 半人马座 α -->
    <circle cx="80" cy="-40" r="5" fill="#4fc3f7" opacity="0.7" filter="url(#glow)"/>
    <text x="80" y="-50" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#78909c">α Cen</text>
    <text x="80" y="-40" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#546e7a">4.3 ly</text>

    <!-- 巴纳德星 -->
    <circle cx="-100" cy="55" r="4" fill="#4fc3f7" opacity="0.6" filter="url(#glow)"/>
    <text x="-100" y="68" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#546e7a">Barnard</text>

    <!-- 天狼星 -->
    <circle cx="140" cy="60" r="4" fill="#81c784" opacity="0.6" filter="url(#glow)"/>
    <text x="140" y="73" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#546e7a">Sirius</text>

    <!-- 更远的节点 -->
    <circle cx="-180" cy="-80" r="3" fill="#ffb74d" opacity="0.5"/>
    <circle cx="200" cy="-100" r="3" fill="#ffb74d" opacity="0.5"/>
    <circle cx="250" cy="50" r="3" fill="#ef5350" opacity="0.4"/>
    <circle cx="-250" cy="30" r="3" fill="#ef5350" opacity="0.4"/>
    <circle cx="300" cy="-40" r="2.5" fill="#ce93d8" opacity="0.35"/>
    <circle cx="-300" cy="-50" r="2.5" fill="#ce93d8" opacity="0.35"/>
    <circle cx="-200" cy="100" r="2.5" fill="#ce93d8" opacity="0.3"/>
    <circle cx="150" cy="120" r="2.5" fill="#ce93d8" opacity="0.3"/>

    <!-- 扩散波 -->
    <circle cx="0" cy="0" r="60" fill="none" stroke="#fff176" stroke-width="0.8" opacity="0.2" stroke-dasharray="3,6"/>
    <circle cx="0" cy="0" r="120" fill="none" stroke="#4fc3f7" stroke-width="0.6" opacity="0.15" stroke-dasharray="3,8"/>
    <circle cx="0" cy="0" r="200" fill="none" stroke="#81c784" stroke-width="0.5" opacity="0.1" stroke-dasharray="2,10"/>
    <circle cx="0" cy="0" r="280" fill="none" stroke="#ce93d8" stroke-width="0.4" opacity="0.08" stroke-dasharray="2,12"/>

    <!-- 连接线（殖民路径） -->
    <line x1="0" y1="0" x2="80" y2="-40" stroke="#4fc3f7" stroke-width="0.8" opacity="0.3"/>
    <line x1="80" y1="-40" x2="-100" y2="55" stroke="#4fc3f7" stroke-width="0.6" opacity="0.2"/>
    <line x1="0" y1="0" x2="140" y2="60" stroke="#81c784" stroke-width="0.6" opacity="0.2"/>
    <line x1="-100" y1="55" x2="-180" y2="-80" stroke="#ffb74d" stroke-width="0.5" opacity="0.15"/>
    <line x1="140" y1="60" x2="250" y2="50" stroke="#ef5350" stroke-width="0.5" opacity="0.12"/>
  </g>

  <!-- 底部时间里程碑 -->
  <g transform="translate(50, 480)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#e0f7fa">殖民时间里程碑</text>

    <g font-family="Arial, sans-serif" font-size="9">
      <!-- 2100 -->
      <rect x="0" y="10" width="210" height="42" rx="6" fill="#1a237e" fill-opacity="0.6" stroke="#4fc3f7" stroke-width="0.5"/>
      <text x="10" y="26" fill="#b3e5fc" font-weight="bold">2100 年</text>
      <text x="10" y="38" fill="#78909c">首批机器人星际探测器飞向比邻星</text>
      <text x="10" y="48" fill="#78909c">20% 光速 · 20 年到达</text>

      <!-- 2200 -->
      <rect x="220" y="10" width="210" height="42" rx="6" fill="#1a237e" fill-opacity="0.6" stroke="#81c784" stroke-width="0.5"/>
      <text x="230" y="26" fill="#c8e6c9" font-weight="bold">2200 年</text>
      <text x="230" y="38" fill="#78909c">10 个邻近恒星系完成部署</text>
      <text x="230" y="48" fill="#78909c">机器人前哨网络形成</text>

      <!-- 3000 -->
      <rect x="440" y="10" width="210" height="42" rx="6" fill="#1a237e" fill-opacity="0.6" stroke="#ffb74d" stroke-width="0.5"/>
      <text x="450" y="26" fill="#ffe0b2" font-weight="bold">3000 年</text>
      <text x="450" y="38" fill="#78909c">100 光年内所有恒星系覆盖</text>
      <text x="450" y="48" fill="#78909c">银河系旋臂开始殖民</text>

      <!-- 10000+ -->
      <rect x="660" y="10" width="230" height="42" rx="6" fill="#1a237e" fill-opacity="0.6" stroke="#ce93d8" stroke-width="0.5"/>
      <text x="670" y="26" fill="#e1bee7" font-weight="bold">10,000 ~ 100,000 年</text>
      <text x="670" y="38" fill="#78909c">银河系旋臂全覆盖</text>
      <text x="670" y="48" fill="#78909c">银河系全域文明</text>
    </g>
  </g>

  <!-- 底部标注 -->
  <g transform="translate(50, 560)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="10" fill="#546e7a">
      殖民模式：抵达恒星系 → 着陆行星/小行星 → 开采资源 → 自我复制至 1,000+ 台 → 建造新飞船 → 发射至下一个目标
    </text>
    <text x="0" y="18" font-family="Arial, sans-serif" font-size="10" fill="#546e7a">
      速度：约 100 万年覆盖整个银河系（直径 10 万光年） | 人类通过量子通信"意识漫游"至银河系任何一台机器人
    </text>
  </g>
</svg>
