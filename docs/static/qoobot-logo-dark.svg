    <line x1="45" y1="46" x2="60" y2="32.5" stroke="#22d3ee" stroke-width="1.5" opacity="0.5"/>
    <line x1="45" y1="54" x2="30" y2="65.5" stroke="#22d3ee" stroke-width="1.5" opacity="0.5"/>
    <line x1="45" y1="54" x2="60" y2="65.5" stroke="#22d3ee" stroke-width="1.5" opacity="0.5"/>

    <line x1="45" y1="12" x2="45" y2="8" stroke="url(#circuitGrad)" stroke-width="2"/>
    <circle cx="45" cy="6" r="3" fill="url(#circuitGrad)"/>
  </g>

  <text x="110" y="52" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="800" fill="#e6edf3" letter-spacing="-1">QooBot</text>
  <text x="112" y="72" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#8b949e" letter-spacing="2">OPEN BRAIN OS FOR ROBOTS</text>
  <rect x="112" y="80" width="260" height="2" rx="1" fill="url(#circuitGrad)" opacity="0.5"/>
