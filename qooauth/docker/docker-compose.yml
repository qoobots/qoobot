version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: qooauth-postgres
    environment:
      POSTGRES_DB: qooauth
      POSTGRES_USER: qooauth
      POSTGRES_PASSWORD: qooauth_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qooauth"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.2-alpine
    container_name: qooauth-redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  qooauth-auth:
    build:
      context: ..
      dockerfile: docker/auth/Dockerfile
    container_name: qooauth-auth
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: dev
      DB_PASSWORD: qooauth_dev
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "8080:8080"

  qooauth-user:
    build:
      context: ..
      dockerfile: docker/user/Dockerfile
    container_name: qooauth-user
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: dev
      DB_PASSWORD: qooauth_dev
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "8081:8080"

volumes:
  postgres_data:
  redis_data:
