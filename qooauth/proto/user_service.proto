syntax = "proto3";

package qooauth.user.v1;

option java_package = "com.qoobot.qooauth.proto.user";
option java_multiple_files = true;
option go_package = "github.com/qoobot/qooauth/proto/user/v1;userv1";

import "google/protobuf/timestamp.proto";

// UserService provides user management RPCs.
service UserService {
    // GetUser retrieves a user by ID.
    rpc GetUser(GetUserRequest) returns (GetUserResponse);

    // GetUserByEmail retrieves a user by email address.
    rpc GetUserByEmail(GetUserByEmailRequest) returns (GetUserByEmailResponse);

    // ListUsers retrieves a paginated list of users.
    rpc ListUsers(ListUsersRequest) returns (ListUsersResponse);

    // UpdateUser updates a user's information.
    rpc UpdateUser(UpdateUserRequest) returns (UpdateUserResponse);

    // DeleteUser removes a user (soft delete).
    rpc DeleteUser(DeleteUserRequest) returns (DeleteUserResponse);
}

message User {
    string user_id = 1;
    string email = 2;
    string display_name = 3;
    string avatar_url = 4;
    repeated string roles = 5;
    string state = 6; // ACTIVE, FROZEN, DELETED
    google.protobuf.Timestamp created_at = 7;
    google.protobuf.Timestamp updated_at = 8;
    google.protobuf.Timestamp last_login_at = 9;
}

message GetUserRequest {
    string user_id = 1;
}

message GetUserResponse {
    User user = 1;
}

message GetUserByEmailRequest {
    string email = 1;
}

message GetUserByEmailResponse {
    User user = 1;
}

message ListUsersRequest {
    // Page number (1-indexed).
    int32 page = 1;

    // Page size (1-100).
    int32 page_size = 2;

    // Optional: filter by state.
    string state = 3;

    // Optional: search query (matches email or display_name).
    string search = 4;

    // Optional: sort field.
    string sort_by = 5;

    // Optional: sort direction (ASC/DESC).
    string sort_direction = 6;
}

message ListUsersResponse {
    repeated User users = 1;
    int32 total_count = 2;
    int32 page = 3;
    int32 page_size = 4;
}

message UpdateUserRequest {
    string user_id = 1;
    optional string display_name = 2;
    optional string avatar_url = 3;
    repeated string roles = 4;
    optional string state = 5;
}

message UpdateUserResponse {
    User user = 1;
}

message DeleteUserRequest {
    string user_id = 1;
}

message DeleteUserResponse {
    bool success = 1;
    string message = 2;
}
