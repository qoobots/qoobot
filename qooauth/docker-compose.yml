version: '3.8'

services:
  auth-server:
    build: .
    ports:
      - "8080:8080"
      - "9090:9090"
    environment:
      - QOOAUTH_DATABASE_URL=postgres://qooauth:qooauth@postgres:5432/qooauth?sslmode=disable
      - QOOAUTH_REDIS_URL=redis://redis:6379/0
      - QOOAUTH_JWT_PRIVATE_KEY_PATH=/run/secrets/jwt_private_key
      - QOOAUTH_LOG_LEVEL=debug
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    secrets:
      - jwt_private_key
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: qooauth
      POSTGRES_PASSWORD: qooauth
      POSTGRES_DB: qooauth
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qooauth"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

secrets:
  jwt_private_key:
    file: ./deploy/secrets/jwt_private_key.pem
