apiVersion: apps/v1
kind: Deployment
metadata:
  name: qooauth
  namespace: qoobot
  labels:
    app: qooauth
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: qooauth
  template:
    metadata:
      labels:
        app: qooauth
    spec:
      containers:
      - name: auth-server
        image: qoobot/qooauth:latest
        ports:
        - containerPort: 8080
          name: http
        - containerPort: 9090
          name: grpc
        env:
        - name: QOOAUTH_DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: qooauth-secrets
              key: database-url
        - name: QOOAUTH_REDIS_URL
          valueFrom:
            secretKeyRef:
              name: qooauth-secrets
              key: redis-url
        - name: QOOAUTH_JWT_PRIVATE_KEY_PATH
          value: /etc/qooauth/secrets/jwt_private_key.pem
        - name: QOOAUTH_LOG_LEVEL
          value: "info"
        resources:
          requests:
            cpu: 250m
            memory: 256Mi
          limits:
            cpu: 1000m
            memory: 512Mi
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        volumeMounts:
        - name: jwt-keys
          mountPath: /etc/qooauth/secrets
          readOnly: true
      volumes:
      - name: jwt-keys
        secret:
          secretName: qooauth-jwt-keys
