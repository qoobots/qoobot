server:
  port: 8085

spring:
  application:
    name: qooauth-robot-trust
  datasource:
    url: jdbc:postgresql://localhost:5432/qooauth
    username: ${DB_USERNAME:qooauth}
    password: ${DB_PASSWORD:qooauth}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: false
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${JWT_ISSUER_URI:http://localhost:8081}
          jwk-set-uri: ${JWK_SET_URI:http://localhost:8081/.well-known/jwks.json}

robot-trust:
  mTLS:
    enabled: true
    ca-cert-path: ${MTLS_CA_CERT_PATH:/etc/qooauth/certs/ca.crt}
    client-cert-required: true
  collaboration:
    default-token-ttl-seconds: 3600
    max-token-ttl-seconds: 86400
  cleanup:
    expired-token-cron: "0 */5 * * * *"

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when_authorized

logging:
  level:
    com.qoobot.qooauth.robot: DEBUG
    org.springframework.security: INFO
