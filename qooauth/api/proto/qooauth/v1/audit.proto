syntax = "proto3";
package qooauth.v1;

import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/qoobot/qooauth/api/proto/qooauth/v1;qooauthv1";

// AuditService 审计服务 gRPC 接口
service AuditService {
  rpc RecordEvent(RecordEventRequest) returns (google.protobuf.Empty);
  rpc QueryEvents(QueryEventsRequest) returns (QueryEventsResponse);
}

message RecordEventRequest {
  string user_id = 1;
  string action = 2;
  string resource_type = 3;
  string resource_id = 4;
  string details = 5;  // JSON string
  string ip_address = 6;
  string user_agent = 7;
  bool success = 8;
  string error_code = 9;
}

message QueryEventsRequest {
  string user_id = 1;
  string action = 2;
  string resource_type = 3;
  google.protobuf.Timestamp from = 4;
  google.protobuf.Timestamp to = 5;
  int32 limit = 6;
  int32 offset = 7;
}

message QueryEventsResponse {
  repeated AuditEvent events = 1;
  int64 total = 2;
}

message AuditEvent {
  string id = 1;
  string user_id = 2;
  string action = 3;
  string resource_type = 4;
  string resource_id = 5;
  string details = 6;
  string ip_address = 7;
  string user_agent = 8;
  bool success = 9;
  string error_code = 10;
  google.protobuf.Timestamp created_at = 11;
}
