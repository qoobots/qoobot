apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: qooauth-ingress
  namespace: qooauth
  labels:
    app.kubernetes.io/part-of: qoobot
    app.kubernetes.io/component: gateway
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-buffer-size: "16k"
    nginx.ingress.kubernetes.io/proxy-buffers-number: "8"
    nginx.ingress.kubernetes.io/limit-rps: "100"
    nginx.ingress.kubernetes.io/limit-connections: "50"
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "*"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET,POST,PUT,PATCH,DELETE,OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-headers: "Authorization,Content-Type,X-Request-Id"
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
    - hosts:
        - auth.qoobot.io
        - api.qoobot.io
      secretName: qooauth-tls
  rules:
    # Auth-specific subdomain
    - host: auth.qoobot.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: qooauth-gateway
                port:
                  number: 8080
    # General API subdomain
    - host: api.qoobot.io
      http:
        paths:
          - path: /auth/
            pathType: Prefix
            backend:
              service:
                name: qooauth-gateway
                port:
                  number: 8080
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: qooauth-network-policy
  namespace: qooauth
  labels:
    app.kubernetes.io/part-of: qoobot
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: qooauth
      ports:
        - protocol: TCP
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: 8080
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: qooauth
      ports:
        - protocol: TCP
    - to:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              app.kubernetes.io/name: postgresql
      ports:
        - protocol: TCP
          port: 5432
    - to:
        - podSelector:
            matchLabels:
              app: qooauth-redis
      ports:
        - protocol: TCP
          port: 6379
