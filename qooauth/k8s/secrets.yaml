apiVersion: v1
kind: Secret
metadata:
  name: qooauth-secrets
  namespace: qooauth
  labels:
    app.kubernetes.io/part-of: qoobot
    app.kubernetes.io/component: auth
type: Opaque
stringData:
  # IMPORTANT: Replace these placeholder values with actual secrets before deploying.
  # Use external secrets management (Vault, AWS Secrets Manager, etc.) in production.

  # Database credentials
  DB_USERNAME: "qooauth"
  DB_PASSWORD: "change-me-in-production"

  # Redis password
  REDIS_PASSWORD: "change-me-in-production"

  # JWT signing keys (generate with: openssl rand -base64 64)
  JWT_SIGNING_KEY: "change-me-use-generated-key"

  # Encryption key for sensitive data at rest (256-bit, base64 encoded)
  ENCRYPTION_KEY: "change-me-use-generated-key"

  # OAuth2 Client Secrets (placeholder)
  OAUTH2_DEFAULT_CLIENT_SECRET: "change-me-in-production"

  # mTLS CA private key path reference
  MTLS_CA_KEY_PATH: "/etc/qooauth/certs/ca.key"

  # API Key derivation secret
  API_KEY_DERIVATION_SECRET: "change-me-in-production"

  # Collaboration delegation secret
  COLLABORATION_DELEGATION_SECRET: "change-me-in-production"
---
